  <text x="1215" y="395" text-anchor="end" fill="#64748B" font-size="18"
        font-family="Noto Sans KR, Apple SD Gothic Neo, Malgun Gothic, sans-serif">AI 활용 Python 프로그래밍 · Week 05</text>
